image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:22-alpine

workflow:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - setup
  - handover
  - test

generate_dotenv:
  stage: setup
  script:
    - |
      if [[ $CI_COMMIT_BRANCH == "main" ]]; then
        echo "ENVIRONMENT=Production" >> .env
      else
        echo "ENVIRONMENT=Staging" >> .env
      fi
  artifacts:
    reports:
      dotenv: .env

trigger_child_pipelines:
  stage: handover
  variables:
    ENVIRONMENT: $ENVIRONMENT
  parallel:
    matrix:
      - APP: web
  trigger:
    include:
      - local: .gitlab/ci/.gitlab-ci.create-childs.yml
    strategy: depend
  needs:
    - job: generate_dotenv
      artifacts: true
